name: Deploy Laravel Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Se déplacer dans le dossier personnel du compte root
            cd /root

            # 2. Cloner le projet s'il n'existe pas, sinon se préparer à le mettre à jour
            if [ ! -d "tooauto-web" ]; then
              git clone git@github.com:${{ github.repository }}.git tooauto-web
            fi

            cd /root/tooauto-web

            # 3. Nettoyer et récupérer le dernier code proprement
            git fetch --all
            git reset --hard origin/main

            # 4. Installer les dépendances PHP avec Composer
            composer install --no-dev --optimize-autoloader --no-interaction

            # 5. Exécuter les optimisations Laravel si le fichier .env existe
            if [ -f ".env" ]; then
              php artisan down
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan up
            else
              echo "⚠️ Attention : Fichier .env absent. Pense à créer le fichier /root/tooauto-web/.env manuellement sur ton serveur."
            fi
